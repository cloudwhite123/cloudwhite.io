            <div class="page-content">
                <h2 id="心得">心得</h2>
<p>本書分為了幾個階段描述了查理，首先是未經過手術前的查理，讓人感覺到非常的單純，這時的日記也是非常的口語化。
動了手術後的查理，這裡花很長篇幅在描繪。首先，他急迫地想要變&quot;聰明&quot;，再來是得到&quot;聰明&quot;後，對自己人生的體悟，最後他發現了最後自己會變回笨蛋的事實。這段我認為也是本書最精彩的環節。查理不斷的拋出疑問，思考他的人生意義。
最後查理變回了笨蛋，日記也回到了最初的感覺，讓讀者感受到他在原始的純真。</p>
